name: K6 AAP Soak Test

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Test scenario to run"
        required: false
        default: "create-only"
        type: choice
        options:
          - create-only
          - write-journey

jobs:
  soak_test:
    name: Run k6 Soak Test
    runs-on: [ self-hosted, hmpps-github-actions-runner ]
    timeout-minutes: 500

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build xk6 dashboard-enabled k6
        run: |
          go install go.k6.io/xk6/cmd/xk6@latest
          xk6 build --with github.com/grafana/xk6-dashboard@latest

      - name: Run k6 AAP Soak Test
        env:
          AAP_CLIENT_ID: ${{ secrets.AAP_CLIENT_ID }}
          AAP_CLIENT_SECRET: ${{ secrets.AAP_CLIENT_SECRET }}
          TOKEN_URL: ${{ secrets.TOKEN_URL }}
          
          CUSTOM_STAGES: '[{"duration":"10m","target":100},{"duration":"4h","target":100},{"duration":"10m","target":0}]'
          
          MIN_THINK_TIME: "5"
          MAX_THINK_TIME: "15"
          
          P95_THRESHOLD: "550"   
          P90_THRESHOLD: "450"

          NO_CONNECTION_REUSE: "true"
          
        run: |
          if [ "${{ inputs.scenario }}" = "write-journey" ]; then
            TEST_FILE="performance/tests/aapApiWriteJourney.js"
          else
            TEST_FILE="performance/tests/aapApi.js"
          fi
          ./k6 run "$TEST_FILE" --out web-dashboard=export=aap-soak-report.html

      - name: Upload Soak Test Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k6-soak-report
          path: aap-soak-report.html
          retention-days: 1