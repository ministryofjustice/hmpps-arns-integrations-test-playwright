name: K6 AAP Soak Test

on:
  workflow_dispatch: # Manual trigger only

jobs:
  soak_test:
    name: Run k6 Soak Test
    runs-on: [ self-hosted, hmpps-github-actions-runner ]
    timeout-minutes: 500

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 AAP Soak Test
        env:
          AAP_CLIENT_ID: ${{ secrets.AAP_CLIENT_ID }}
          AAP_CLIENT_SECRET: ${{ secrets.AAP_CLIENT_SECRET }}
          TOKEN_URL: ${{ secrets.TOKEN_URL }}
          
          CUSTOM_STAGES: '[{"duration":"10m","target":100},{"duration":"4h","target":100},{"duration":"10m","target":0}]'
          
          MIN_THINK_TIME: "5"
          MAX_THINK_TIME: "15"
          
          P95_THRESHOLD: "550"   
          P90_THRESHOLD: "450"

          NO_CONNECTION_REUSE: "true"

          # Environment variables for the Web Dashboard
          K6_WEB_DASHBOARD: "true"
          K6_WEB_DASHBOARD_EXPORT: "aap-soak-report.html"
          
        run: k6 run performance/tests/aapApi.js

      - name: Upload Soak Test Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k6-soak-report
          path: aap-soak-report.html
          retention-days: 1