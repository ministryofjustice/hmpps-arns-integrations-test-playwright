name: K6 AAP Hybrid Load Test 

on:
  workflow_dispatch: # Manual trigger only

jobs:
  load_test:
    name: Run k6 Hybrid Load Test
    runs-on: [ self-hosted, hmpps-github-actions-runner ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Build xk6 dashboard-enabled k6
        run: |
          go install go.k6.io/xk6/cmd/xk6@latest
          xk6 build --with github.com/grafana/xk6-dashboard@latest

      - name: Setup Chrome for k6
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run k6 AAP Hybrid Load Test
        env:
          K6_BROWSER_EXECUTABLE_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          K6_BROWSER_ENABLED: "true"
          K6_BROWSER_HEADLESS: "true"
          UI_DURATION: "18m"
          
          AAP_CLIENT_ID: ${{ secrets.AAP_CLIENT_ID }}
          AAP_CLIENT_SECRET: ${{ secrets.AAP_CLIENT_SECRET }}
          TOKEN_URL: ${{ secrets.TOKEN_URL }}
          
          CUSTOM_STAGES: '[{"duration":"3m","target":300},{"duration":"10m","target":400},{"duration":"5m","target":0}]'
          
          MIN_THINK_TIME: "5"
          MAX_THINK_TIME: "10"

          # Adjust thresholds for heavier load
          P95_THRESHOLD: "1000" 
          P90_THRESHOLD: "700"
          
        run: ./k6 run performance/tests/aap-hybrid-load-performance-test.js --out web-dashboard=export=aap-load-report.html

      - name: Upload Hybrid Load Test Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k6-hybrid-load-report
          path: aap-hybrid-load-report.html
          retention-days: 1