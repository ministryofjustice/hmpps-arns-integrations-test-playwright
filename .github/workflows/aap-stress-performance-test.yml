name: K6 AAP Stress Test 

on:
  workflow_dispatch: # Manual trigger only

jobs:
  load_test:
    name: Run k6 Stress Test
    runs-on: [ self-hosted, hmpps-github-actions-runner ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 AAP Stress Test
        env:
          AAP_CLIENT_ID: ${{ secrets.AAP_CLIENT_ID }}
          AAP_CLIENT_SECRET: ${{ secrets.AAP_CLIENT_SECRET }}
          TOKEN_URL: ${{ secrets.TOKEN_URL }}
          
          CUSTOM_STAGES: '[{"duration":"3m","target":2500},{"duration":"5m","target":3000},{"duration":"2m","target":0}]'

          # Adjust thresholds for heavier load
          P95_THRESHOLD: "1200" 
          P90_THRESHOLD: "800"

          # Use the native environment variables for the Web Dashboard
          K6_WEB_DASHBOARD: "true"
          K6_WEB_DASHBOARD_EXPORT: "aap-stress-report.html"
          
        run: k6 run performance/tests/aapApi.js

      - name: Upload Stress Test Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k6-stress-report
          path: aap-stress-report.html
          retention-days: 1