name: K6 AAP Smoke Test

on:
  schedule:
    - cron: "0 19 * * 1,3,5"
  workflow_dispatch:

jobs:
  performance_smoke_test:
    name: Run k6 with Dashboard
    runs-on: [ self-hosted, hmpps-github-actions-runner ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Set up test data
        script: npx ts-node performance/setup/env.ts

      - name: Run k6 AAP smoke performance test
        env:
          AAP_CLIENT_ID: ${{ secrets.AAP_CLIENT_ID }}
          AAP_CLIENT_SECRET: ${{ secrets.AAP_CLIENT_SECRET }}
          TOKEN_URL: ${{ secrets.TOKEN_URL }}

          VUS: "5"
          DURATION: "30s"

          MIN_THINK_TIME: "1"
          MAX_THINK_TIME: "5"

          # Environment variables for the Web Dashboard
          K6_WEB_DASHBOARD: "true"
          K6_WEB_DASHBOARD_EXPORT: "aap-smoke-report.html"

        run: k6 run performance/tests/aapApi-smoke.js

      - name: Upload Smoke Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k6-smoke-report
          path: aap-smoke-report.html
          retention-days: 1

      - name: Slack notification
        if: failure()
        uses: slackapi/slack-github-action@v3.0.1
        env:
          SLACK_CHANNEL: ${{ inputs.channel_id }}
          REPO_NAME: ${{ github.repository }}
          SLACK_BOT_TOKEN: ${{ secrets.HMPPS_SLACK_BOT_TOKEN }}
        with:
          method: chat.postMessage
          token: ${{ secrets.HMPPS_SLACK_BOT_TOKEN }}
          payload: |
            {
              "channel": "${{ env.SLACK_CHANNEL }}",
              "attachments": [
               {
                 "color": "#FF0000",
                 "text": ":x: *AAP API Smoke Performance test notification*\nWorkflow failed for ${{ env.REPO_NAME }}"
                }
              ]
            }