name: K6 Smoke Tests

on:
  schedule:
    - cron: "0 19 * * 1,3,5"
  workflow_dispatch:

jobs:
  aap_smoke_test:
    name: Run AAP k6 with Dashboard
    uses: ./.github/workflows/smoke-performance-test.yml
    secrets: inherit
    with:
      test_name: aap
      channel_id: ${{ vars.INTEGRATION_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}

  handover_smoke_test:
    name: Run Handover k6 with Dashboard
    uses: ./.github/workflows/smoke-performance-test.yml
    secrets: inherit
    with:
      test_name: handover
      channel_id: ${{ vars.INTEGRATION_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}

  coordinator_smoke_test:
    name: Run Handover k6 with Dashboard
    uses: ./.github/workflows/smoke-performance-test.yml
    secrets: inherit
    with:
      test_name: coordinator
      channel_id: ${{ vars.INTEGRATION_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
