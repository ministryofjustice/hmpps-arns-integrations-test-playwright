name: K6 AAP Smoke Test

on:
  schedule:
    - cron: "0 19 * * 1,3,5"
  workflow_dispatch:

jobs:
  performance_smoke_test:
    name: Run k6 with Dashboard
    runs-on: [ self-hosted, hmpps-github-actions-runner ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 AAP smoke performance test
        uses: ./.github/workflows/templates/smoke-performance-test.yml
        with:
          test_name: aap
          channel_id: ${{ vars.INTEGRATION_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}

      - name: Run k6 Handover smoke performance test
        uses: ./.github/workflows/templates/smoke-performance-test.yml
        with:
          test_name: handover
          channel_id: ${{ vars.INTEGRATION_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}

      - name: Run k6 Coordinator smoke performance test
        uses: ./.github/workflows/templates/smoke-performance-test.yml
        with:
          test_name: coordinator
          channel_id: ${{ vars.INTEGRATION_ALERTS_SLACK_CHANNEL_ID || 'NO_SLACK' }}
