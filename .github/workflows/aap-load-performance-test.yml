name: K6 AAP Load Test 

on:
  workflow_dispatch: # Manual trigger only

jobs:
  load_test:
    name: Run k6 Load Test
    runs-on: [ self-hosted, hmpps-github-actions-runner ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 AAP Load Test
        env:
          AAP_CLIENT_ID: ${{ secrets.AAP_CLIENT_ID }}
          AAP_CLIENT_SECRET: ${{ secrets.AAP_CLIENT_SECRET }}
          TOKEN_URL: ${{ secrets.TOKEN_URL }}
          
          CUSTOM_STAGES: '[{"duration":"10m","target":200},{"duration":"10m","target":200},{"duration":"5m","target":0}]'
          
          MIN_THINK_TIME: "15"
          MAX_THINK_TIME: "30"

          # Adjust thresholds for heavier load
          P95_THRESHOLD: "1000" 
          P90_THRESHOLD: "700"

          # Environment variables for the Web Dashboard
          K6_WEB_DASHBOARD: "true"
          K6_WEB_DASHBOARD_EXPORT: "aap-load-report.html"
          
        run: k6 run performance/tests/aapApi.js

      - name: Upload Load Test Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: k6-load-report
          path: aap-load-report.html
          retention-days: 1